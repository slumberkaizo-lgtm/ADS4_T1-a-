<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расчет алгоритма Беллмана-Форда</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 30px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 24px;
            color: #2b6cb0;
            border-bottom: 2px solid #2b6cb0;
            padding-bottom: 8px;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .iteration-box {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-left: 4px solid #4a5568;
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
        }
        .iteration-title {
            font-size: 16px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .log-line {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13.5px;
            margin: 4px 0;
            color: #2c5282;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        th, td {
            border: 1px solid #cbd5e0;
            padding: 8px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #edf2f7;
        }
        .final-results {
            margin-top: 20px;
            padding: 15px;
            background: #ebf8ff;
            border: 1px solid #3182ce;
            border-radius: 6px;
        }
        .final-results ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="section-title">Source = A</div>
    <div id="output-A"></div>

    <div class="section-title">Source = B</div>
    <div id="output-B"></div>
</div>

<script>
    const edges = [
        { src: "A", dest: "B", weight: 3 },
        { src: "A", dest: "E", weight: 8 },
        { src: "A", dest: "D", weight: -3 },
        { src: "B", dest: "F", weight: 6 },
        { src: "B", dest: "H", weight: 6 },
        { src: "C", dest: "B", weight: -2 },
        { src: "C", dest: "E", weight: -1 },
        { src: "D", dest: "F", weight: 5 },
        { src: "E", dest: "D", weight: 10 },
        { src: "E", dest: "G", weight: 1 },
        { src: "E", dest: "H", weight: -4 },
        { src: "G", dest: "F", weight: 5 },
        { src: "H", dest: "G", weight: 4 }
    ];

    const vertices = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const INF = Infinity;

    function generateTable(distanceMap) {
        let html = '<table><thead><tr>';
        vertices.forEach(v => html += `<th>${v}</th>`);
        html += '</tr></thead><tbody><tr>';
        vertices.forEach(v => {
            let d = distanceMap[v];
            html += `<td><strong>${d === INF ? "∞" : d}</strong></td>`;
        });
        html += '</tr></tbody></table>';
        return html;
    }

    function calculate(source, targetDivId) {
        const outputDiv = document.getElementById(targetDivId);
        let distance = {};
        vertices.forEach(v => distance[v] = INF);
        distance[source] = 0;

        // Шаг 0
        let initBox = document.createElement("div");
        initBox.className = "iteration-box";
        initBox.style.borderLeftColor = "#3182ce";
        initBox.innerHTML += generateTable(distance);
        outputDiv.appendChild(initBox);

        // Итерации
        for (let i = 1; i < vertices.length; i++) {
            let iterationBox = document.createElement("div");
            iterationBox.className = "iteration-box";
            let htmlContent = `<div class="iteration-title">Interation ${i}:</div>`;
            let logsHtml = "";
            let updated = false;

            edges.forEach(edge => {
                if (distance[edge.src] !== INF) {
                    let oldDist = distance[edge.dest];
                    let newDist = distance[edge.src] + edge.weight;

                    if (newDist < oldDist) {
                        let oldDistStr = (oldDist === INF) ? "∞" : oldDist;
                        logsHtml += `<div class="log-line">✔ ${edge.src} → ${edge.dest} (вес ${edge.weight}): V_${edge.dest} = min(${oldDistStr}, ${distance[edge.src]} + (${edge.weight})) = ${newDist}</div>`;
                        distance[edge.dest] = newDist;
                        updated = true;
                    }
                }
            });

            if (!updated) {
                htmlContent += `<p style="color: #2f855a; font-size: 14px; margin: 5px 0;">[No changes, algorithm is stabilized]</p>`;
            } else {
                htmlContent += logsHtml;
            }

            htmlContent += generateTable(distance);
            iterationBox.innerHTML = htmlContent;
            outputDiv.appendChild(iterationBox);

            if (!updated) break;
        }

        // Результат
        let finalBox = document.createElement("div");
        finalBox.className = "final-results";
        let finalHtml = `<strong>Shortest dist:</strong><ul>`;
        vertices.forEach(v => {
            let dStr = (distance[v] === INF) ? "∞" : distance[v];
            finalHtml += `<li>До <strong>${v}</strong>: ${dStr}</li>`;
        });
        finalHtml += "</ul>";
        finalBox.innerHTML = finalHtml;
        outputDiv.appendChild(finalBox);
    }

    calculate("A", "output-A");
    calculate("B", "output-B");
</script>

</body>
</html>
